name: Build APK

on:
  # 每次推送到 main/master 分支时自动构建
  push:
    branches:
      - main
      - master
  # 允许在 GitHub 网页上手动触发
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 配置 JDK 17 ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 赋予 gradlew 执行权限 ─────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. 缓存 Gradle 依赖（加速后续构建）─────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. 构建 Debug APK（无需签名，可直接安装）────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 6. 重命名产物，加上版本号和构建时间 ─────────────────────────
      - name: Rename APK files
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          mkdir -p artifacts
          # 仅保留 Debug APK 并重命名
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/ScreenTranslator-debug-${DATE}.apk

      # ── 7. 上传构建产物（在 Actions 页面直接下载）────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTranslator-Debug-APK
          path: artifacts/
          retention-days: 30

      # ── 8. 自动创建 GitHub Release（仅 main/master 分支）────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name